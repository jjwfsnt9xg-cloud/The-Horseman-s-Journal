<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Horseman’s Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO (ONLY IMAGE SECTION) -->
<div class="hero">
  <div class="overlay"></div>

  <div class="content">
    <h1>The Horseman’s Journal</h1>
    <p class="author">by Praveen</p>

    <p class="quote">
      “a fragile human outside<br>
      and a horse inside”
    </p>

    <div class="gold-line"></div>

    <button onclick="scrollToIntro()" class="read-btn">
      Read below ↓
    </button>
  </div>
</div>

<!-- INTRO (TEXT ONLY - CLEAN) -->
<div id="intro" class="intro-section">
  <div class="intro-text">

    <p>I have spent years observing horses.</p>

    <p>
      Not to control them,  
      but to understand them.
    </p>

  </div>
</div>

<!-- IMAGE BREAK (ONLY SECOND IMAGE) -->
<div class="image-break">
  <div class="image-overlay"></div>

  <div class="image-text">
    <p>I did not go to train them.</p>
    <p>I went to understand.</p>
  </div>
</div>

<!-- HORSE CARD -->
<div class="horses-section">
  <div class="horse-card">
    <img src="hero.jpg">

    <div class="horse-info">
      <h2>The Black Stallion</h2>
      <a href="stallion.html">Read story →</a>
    </div>
  </div>
</div>

<script>
function scrollToIntro() {
  document.getElementById("intro").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
