<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Horseman’s Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="overlay"></div>

  <div class="content">
    <h1>The Horseman’s Journal</h1>
    <p class="author">by Praveen</p>

    <p class="quote">
      “a fragile human outside<br>
      and a horse inside”
    </p>

    <!-- GOLD LINE -->
    <div class="gold-line"></div>

    <button onclick="toggleIntro()" class="read-btn">
      Read below ↓
    </button>
  </div>
</div>

<!-- INTRO -->
<div id="intro" class="intro">
  <div class="intro-content">
    <p>I have spent years observing horses.</p>
    <p>Not to control them, but to understand them.</p>
  </div>
</div>

<!-- SECOND SECTION -->
<div class="section-two">
  <div>
    <p class="line">I did not go to train them.</p>
    <p class="line">I went to understand.</p>
  </div>
</div>

<script>
function toggleIntro() {
  document.getElementById("intro").classList.toggle("show");
}
</script>

</body>
</html>
