<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Horsemen</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO SECTION -->
<section class="hero">

  <!-- IMAGE -->
  <img src="hero.jpg" class="hero-img">

  <!-- OVERLAY -->
  <div class="hero-overlay"></div>

  <!-- TEXT -->
  <div class="hero-content">
    <h1>THE HORSEMEN</h1>
    <p class="author">Praveen Kumar</p>

    <p class="quote">
      “A fragile human outside.<br>
      A horse inside.”
    </p>

    <button onclick="scrollToIntro()">Read Below ↓</button>
  </div>

</section>

<!-- INTRO SECTION -->
<section id="intro" class="intro">
  <h2>There is something horses see...</h2>
  <p>This is where your story will begin.</p>
</section>

<script>
function scrollToIntro() {
  document.getElementById("intro").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
