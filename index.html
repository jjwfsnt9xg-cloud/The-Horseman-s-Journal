<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Horseman’s Journal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO SECTION -->
<section class="hero">

  <!-- IMAGE (this guarantees it loads) -->
  <img src="hero.jpg" class="hero-img">

  <!-- DARK OVERLAY -->
  <div class="overlay"></div>

  <!-- TEXT -->
  <div class="content">
    <h1>The Horseman’s Journal</h1>
    <p class="author">by Praveen Kumar</p>

    <p class="quote">
      “a fragile human outside<br>
      and a horse inside”
    </p>

    <button onclick="scrollToIntro()">Read below ↓</button>
  </div>

</section>


<!-- SECOND SECTION -->
<section id="intro" class="story-section">

  <h2>The Black Stallion Who Whispered My Name in Hoofbeats</h2>

  <div class="story-text">
    <p>I have lived eleven years among horses...</p>
    <p>Ordinary. Quiet. A heart that races...</p>
    <p>Then, the black stallion walked into my life.</p>
  </div>

</section>


<script>
function scrollToIntro() {
  document.getElementById("intro").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
